name: Weekly News-Source Upgrade Check

# Once a week, re-check every news-sourced oversight item to see if an
# official .gov source has been published in the interim. If so, auto-swap
# the link and flip source_type to "official".
#
# This catches cases like: a Dr. Oz letter was reported by news outlets in
# March; CMS later publishes the letter on cms.gov in April. On the next
# weekly run, we swap news link -> cms.gov.

on:
  schedule:
    # Sundays at 10:07 UTC — well after daily scrapers finish
    - cron: '7 10 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Report candidates but do not write changes'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check-news-sources:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml playwright
          playwright install --with-deps chromium

      - name: Check + upgrade news-sourced items
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python check_news_sources.py
          else
            python check_news_sources.py --apply
          fi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/actions.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit upgrades
        if: steps.changes.outputs.has_changes == 'true'
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/actions.json
          DATE=$(date +%Y-%m-%d)
          MSG_FILE=$(mktemp)
          {
            echo "Auto-upgrade: news-sourced items to official sources (${DATE})"
            echo
            echo "Weekly sweep found new official .gov press releases matching previously"
            echo "news-linked oversight items. Swapped link and set source_type=official."
            echo
            echo "Generated by .github/workflows/news-source-check.yml run ${RUN_ID}"
          } > "$MSG_FILE"
          git commit -F "$MSG_FILE"
          git push origin main

      - name: No-op notice
        if: steps.changes.outputs.has_changes == 'false'
        run: echo "::notice::No news-sourced items could be upgraded this week."
