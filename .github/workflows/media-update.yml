name: Daily Media Investigations Update

# Daily cron disabled 2026-04-23 — the AI screen was still letting through
# off-topic media pieces (e.g. KFF medical-debt podcast). Media tab is now
# fully manual via add_item.py. Workflow remains available for manual runs
# via workflow_dispatch if we ever want to re-enable backfill.
on:
  # schedule:
  #   - cron: '42 8 * * *'
  workflow_dispatch:
    inputs:
      backfill_from:
        description: 'Optional: backfill floor date (YYYY-MM-DD). Leave blank for normal daily delta.'
        required: false
        type: string
      dry_run:
        description: 'If true, scrape + audit + ai-review but do NOT commit. For inspection via logs/artifacts.'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install --upgrade pip certifi && pip install requests beautifulsoup4 feedparser lxml playwright anthropic
        playwright install --with-deps chromium

    - name: Run media scraper
      run: |
        ARGS=""
        if [ -n "${{ github.event.inputs.backfill_from }}" ]; then
          ARGS="$ARGS --backfill-from ${{ github.event.inputs.backfill_from }}"
        fi
        echo "Running: python update_media.py $ARGS"
        python update_media.py $ARGS

    - name: Audit new media items (regex flag check)
      run: python audit_new_items.py audit-media

    - name: AI review of flagged media items (Claude Haiku)
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: python audit_new_items.py ai-review-media

    - name: Upload media audit summary as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: media-audit-summary-${{ github.run_number }}
        path: |
          data/_media_audit_summary.md
          data/_media_audit_summary.json
        if-no-files-found: ignore
        retention-days: 30

    - name: Check for changes
      id: changes
      run: |
        if git diff --quiet data/media.json data/needs_review_media.json; then
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "changed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Commit to main (auto-merge)
      if: steps.changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
      run: |
        DATE=$(date +%Y-%m-%d)
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        MSG_FILE=$(mktemp)
        {
          echo "Auto-update: new media investigations ${DATE}"
          echo
          if [ -f data/_media_audit_summary.md ]; then
            cat data/_media_audit_summary.md
            echo
          fi
          echo "Generated by .github/workflows/media-update.yml run ${{ github.run_id }}"
        } > "$MSG_FILE"

        git add data/media.json data/needs_review_media.json
        git commit -F "$MSG_FILE"
        git push origin main

    - name: Dry-run notice
      if: steps.changes.outputs.changed == 'true' && github.event.inputs.dry_run == 'true'
      run: |
        echo "::notice::DRY RUN — changes were staged but NOT committed."
        if [ -f data/_media_audit_summary.md ]; then
          echo "----- _media_audit_summary.md -----"
          cat data/_media_audit_summary.md
        fi

    - name: No-op notice
      if: steps.changes.outputs.changed == 'false'
      run: echo "::notice::No new media items since last scrape. Nothing to commit."
