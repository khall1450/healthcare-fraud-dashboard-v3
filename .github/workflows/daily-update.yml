name: Daily Fraud Dashboard Update

on:
  schedule:
    # Runs at 7:17 AM UTC daily (off-minute to avoid load spikes)
    - cron: '17 7 * * *'
  workflow_dispatch:
    inputs:
      backfill_from:
        description: 'Optional: backfill floor date (YYYY-MM-DD). Leave blank for normal daily delta.'
        required: false
        type: string
      dry_run:
        description: 'If true, scrape + audit + ai-review but do NOT commit. For inspection via logs/artifacts.'
        required: false
        type: boolean
        default: false
      enrich_existing:
        description: 'If true, run ai-enrich --all over every auto-fetched item in actions.json. Used for one-off backfill enrichment.'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 feedparser lxml playwright anthropic
          playwright install --with-deps chromium

      - name: Run update script (enforcement-only)
        run: |
          ARGS="--enforcement-only"
          if [ -n "${{ github.event.inputs.backfill_from }}" ]; then
            ARGS="$ARGS --backfill-from ${{ github.event.inputs.backfill_from }}"
          fi
          echo "Running: python update.py $ARGS"
          python update.py $ARGS

      - name: Audit new items (regex flag check)
        run: python audit_new_items.py

      - name: AI review of flagged items (Claude Haiku)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python audit_new_items.py ai-review

      - name: AI enrich tags + amounts on auto-approved items (Claude Haiku)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.enrich_existing }}" = "true" ]; then
            echo "ENRICH-EXISTING MODE: processing every auto-fetched item"
            python audit_new_items.py ai-enrich --all
          else
            python audit_new_items.py ai-enrich
          fi

      - name: Upload audit summary as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-summary-${{ github.run_number }}
          path: |
            data/_audit_summary.md
            data/_audit_summary.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/actions.json data/needs_review.json data/pending.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit to main (auto-merge)
        if: steps.changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          DATE=$(date +%Y-%m-%d)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Build commit message with audit summary if present
          MSG_FILE=$(mktemp)
          {
            if [ -n "${{ github.event.inputs.backfill_from }}" ]; then
              echo "Auto-update (backfill from ${{ github.event.inputs.backfill_from }}): new enforcement actions ${DATE}"
            else
              echo "Auto-update: new enforcement actions ${DATE}"
            fi
            echo
            if [ -f data/_audit_summary.md ]; then
              cat data/_audit_summary.md
              echo
            fi
            echo "Generated by .github/workflows/daily-update.yml run ${{ github.run_id }}"
          } > "$MSG_FILE"

          git add data/actions.json data/needs_review.json data/pending.json
          git commit -F "$MSG_FILE"
          git push origin main

      - name: Dry-run notice
        if: steps.changes.outputs.has_changes == 'true' && github.event.inputs.dry_run == 'true'
        run: |
          echo "::notice::DRY RUN — changes were staged but NOT committed to main."
          echo "::notice::Inspect the audit-summary artifact to see what would have been committed."
          if [ -f data/_audit_summary.md ]; then
            echo "----- _audit_summary.md -----"
            cat data/_audit_summary.md
          fi

      - name: No-op notice
        if: steps.changes.outputs.has_changes == 'false'
        run: echo "::notice::No new items since last scrape. Nothing to commit."
