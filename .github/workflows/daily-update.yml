name: Daily Fraud Dashboard Update

on:
  schedule:
    # Runs at 7:17 AM UTC daily (off-minute to avoid load spikes)
    - cron: '17 7 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 feedparser lxml playwright
          playwright install --with-deps chromium

      - name: Run update script
        run: python update.py

      - name: Audit new items (regex flag check)
        run: python audit_new_items.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/actions.json data/needs_review.json data/pending.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          RUN_ID=${{ github.run_number }}
          BRANCH="auto-update/${DATE}-${RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add data/actions.json data/needs_review.json data/pending.json
          git commit -m "Auto-update: new enforcement actions for ${DATE}"
          git push origin "$BRANCH"

          # Build the PR body. Include the audit summary if it exists.
          BODY_FILE=$(mktemp)
          {
            echo "## Auto-fetched enforcement actions"
            echo
            echo "The daily scraper found new entries from federal agency sources."
            echo
            if [ -f data/_audit_summary.md ]; then
              cat data/_audit_summary.md
              echo
            fi
            echo "**Review checklist:**"
            echo "- [ ] Auto-approved items look like real enforcement actions"
            echo "- [ ] Titles accurately reflect the source"
            echo "- [ ] Tags are from the allowlist (see tag_allowlist.py)"
            echo "- [ ] Flagged items in needs_review.json have been triaged"
            echo
            echo "> Merge to publish to the live dashboard. Close to discard."
            echo "> Items in \`needs_review.json\` are NOT live — promote or reject after merge."
          } > "$BODY_FILE"

          gh pr create \
            --title "Daily update: new enforcement actions (${DATE})" \
            --body-file "$BODY_FILE"
