name: Daily Oversight Update

# Parallel pipeline to daily-update.yml. Scrapes the same 12 sources but
# keeps only oversight-type items (Audit, Investigation, Hearing, Report,
# Administrative Action, Rule/Regulation, Legislation, etc.) and routes
# them through needs_review_oversight.json + AI review before promoting
# into actions.json.
#
# For the first week or two this opens a PR rather than auto-merging, so
# we can sanity-check what the oversight scrapers are picking up. Once
# the output is consistently clean, switch to direct-commit (mirror of
# daily-update.yml steps "Commit to main").

on:
  schedule:
    # Runs at 8:23 AM UTC daily — 1 hour after the enforcement run, off-minute
    - cron: '23 8 * * *'
  workflow_dispatch:
    inputs:
      backfill_from:
        description: 'Optional: backfill floor date (YYYY-MM-DD).'
        required: false
        type: string
      dry_run:
        description: 'If true, scrape + audit + ai-review but do NOT open a PR.'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  oversight-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip certifi && pip install requests beautifulsoup4 feedparser lxml playwright anthropic
          playwright install --with-deps chromium

      - name: Run update script (oversight-only)
        run: |
          ARGS="--oversight-only"
          if [ -n "${{ github.event.inputs.backfill_from }}" ]; then
            ARGS="$ARGS --backfill-from ${{ github.event.inputs.backfill_from }}"
          fi
          echo "Running: python update.py $ARGS"
          python update.py $ARGS

      - name: Audit oversight items (regex flag check)
        run: python audit_new_items.py audit-oversight

      - name: AI review of remaining flagged oversight items (Claude Haiku)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python audit_new_items.py ai-review-oversight

      - name: Upload oversight audit summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oversight-summary-${{ github.run_number }}
          path: data/_oversight_audit_summary.md
          if-no-files-found: ignore
          retention-days: 30

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/actions.json data/needs_review_oversight.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit to main (auto-merge)
        if: steps.changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          DATE=$(date +%Y-%m-%d)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MSG_FILE=$(mktemp)
          {
            echo "Auto-update: new oversight actions ${DATE}"
            echo
            if [ -f data/_oversight_audit_summary.md ]; then
              cat data/_oversight_audit_summary.md
              echo
            fi
            echo "Generated by .github/workflows/oversight-update.yml run ${{ github.run_id }}"
          } > "$MSG_FILE"

          git add data/actions.json data/needs_review_oversight.json
          git commit -F "$MSG_FILE"
          git push origin main

      - name: Dry-run notice
        if: steps.changes.outputs.has_changes == 'true' && github.event.inputs.dry_run == 'true'
        run: |
          echo "::notice::DRY RUN — changes staged but no PR opened."
          if [ -f data/_oversight_audit_summary.md ]; then
            echo "----- _oversight_audit_summary.md -----"
            cat data/_oversight_audit_summary.md
          fi

      - name: No-op notice
        if: steps.changes.outputs.has_changes == 'false'
        run: echo "::notice::No new oversight items since last scrape. Nothing to commit."
