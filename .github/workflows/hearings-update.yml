name: Daily Congressional Hearings Update

# Parallel pipeline to daily-update.yml and oversight-update.yml.
# Queries api.congress.gov for congressional committee meetings and
# extracts healthcare-fraud-related hearings, filtered by title keywords,
# committee routing, and witness signals.
#
# Auto-includes hearings with explicit HC-fraud phrasing in title or
# HC-relevant committee + fraud keyword. Sends ambiguous items to
# data/tmp_hearings_review_queue.json (not auto-committed; human triage).
#
# Requires secrets:
#   - CONGRESS_GOV_API_KEY: get one free at https://api.congress.gov/sign-up

on:
  schedule:
    # 9:13 UTC — 50 min after oversight-update at 8:23, off-minute
    - cron: '13 9 * * *'
  workflow_dispatch:
    inputs:
      from_date:
        description: 'Start date YYYY-MM-DD (default: 14 days ago)'
        required: false
        type: string
      to_date:
        description: 'End date YYYY-MM-DD (default: today)'
        required: false
        type: string
      dry_run:
        description: 'Run without writing to actions.json'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  hearings-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Compute date range
        id: dates
        run: |
          # Default: look back 14 days (catches delayed API updates + weekend gaps)
          FROM_DATE="${{ github.event.inputs.from_date }}"
          TO_DATE="${{ github.event.inputs.to_date }}"
          if [ -z "$FROM_DATE" ]; then
            FROM_DATE=$(date -u -d '14 days ago' +%Y-%m-%d)
          fi
          if [ -z "$TO_DATE" ]; then
            TO_DATE=$(date -u +%Y-%m-%d)
          fi
          echo "from=$FROM_DATE" >> "$GITHUB_OUTPUT"
          echo "to=$TO_DATE"     >> "$GITHUB_OUTPUT"
          echo "Scraping hearings from $FROM_DATE to $TO_DATE"

      - name: Scrape Congress.gov hearings
        env:
          CONGRESS_GOV_API_KEY: ${{ secrets.CONGRESS_GOV_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scrape_congress_hearings.py \
              --from "${{ steps.dates.outputs.from }}" \
              --to   "${{ steps.dates.outputs.to }}" \
              --workers 8
          else
            python scrape_congress_hearings.py \
              --from "${{ steps.dates.outputs.from }}" \
              --to   "${{ steps.dates.outputs.to }}" \
              --workers 8 --apply
          fi

      - name: Upload review queue artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hearings-review-queue-${{ github.run_number }}
          path: data/tmp_hearings_review_queue.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/actions.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit to main
        if: steps.changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        env:
          FROM_DATE: ${{ steps.dates.outputs.from }}
          TO_DATE: ${{ steps.dates.outputs.to }}
          RUN_ID: ${{ github.run_id }}
        run: |
          DATE=$(date +%Y-%m-%d)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/actions.json
          MSG_FILE=$(mktemp)
          {
            echo "Auto-update: new congressional hearings ${DATE}"
            echo
            echo "Scraped via api.congress.gov/committee-meeting/"
            echo "Window: ${FROM_DATE} to ${TO_DATE}"
            echo "Generated by .github/workflows/hearings-update.yml run ${RUN_ID}"
          } > "$MSG_FILE"
          git commit -F "$MSG_FILE"
          git push origin main

      - name: No-op notice
        if: steps.changes.outputs.has_changes == 'false'
        run: echo "::notice::No new hearings since last scrape."
